syntax = "proto3";

package chat;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// Enums

enum RoomMemberRole {
  MEMBER = 0;
  ADMIN = 1;
  OWNER = 2;
}

enum MessageType {
  TEXT = 0;
  IMAGE = 1;
  FILE = 2;
  SYSTEM = 3;
}

// Shared messages 

message User {
  string id = 1;
  string email = 2;
  string username = 3;
  google.protobuf.StringValue name = 4;
  google.protobuf.StringValue bio = 5;
  google.protobuf.StringValue avatarUrl = 6;
  google.protobuf.Timestamp lastLogin = 7;
  google.protobuf.Timestamp createdAt = 8;
  google.protobuf.Timestamp updatedAt = 9;
}

message ChatRoomMember {
  string id = 1;
  string roomId = 2;
  string userId = 3;
  RoomMemberRole role = 4;
  google.protobuf.Timestamp createdAt = 5;
  User user = 6;
}

message ChatRoom {
  string id = 1;
  string name = 2;
  google.protobuf.StringValue description = 3;
  bool isPrivate = 4;
  google.protobuf.StringValue creatorId = 5;
  google.protobuf.Timestamp createdAt = 6;
  google.protobuf.Timestamp updatedAt = 7;
  User creator = 8;
  repeated ChatRoomMember members = 9;
}

// Db Service 

service Db {
  rpc GetRoom(GetRoomRequest) returns (ChatRoom);
  rpc CreateRoom(CreateRoomRequest) returns (ChatRoom);
  rpc EditRoom(EditRoomRequest) returns (ChatRoom);
  rpc DeleteRoom(DeleteRoomRequest) returns (DeleteRoomResponse);

  rpc GetRoomMemberIds(GetRoomMemberIdsRequest) returns (GetRoomMemberIdsResponse);
  rpc GetRoomMembers(GetRoomMembersRequest) returns (GetRoomMembersResponse);
  rpc AddRoomMember(AddRoomMemberRequest) returns (ChatRoomMember);
  rpc EditRoomMember(EditRoomMemberRequest) returns (ChatRoomMember);
  rpc RemoveRoomMember(RemoveRoomMemberRequest) returns (RemoveRoomMemberResponse);

  rpc CreateMessage(CreateMessageRequest) returns (RoomMessages);
  rpc EditMessageText(EditMessageTextRequest) returns (RoomMessages);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc GetRoomMessages(GetRoomMessagesRequest) returns (GetRoomMessagesResponse);

  rpc CreateUser(CreateUserRequest) returns (User);
  rpc EditUser(EditUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc GetUser(GetUserRequest) returns (User);
}

// ------ Room RPCs ------

message GetRoomRequest {
  string id = 1;
}

message CreateRoomRequest {
  string name = 1;
  google.protobuf.StringValue description = 2;
  bool isPrivate = 3;
  string creatorId = 4;
}

message EditRoomRequest {
  string id = 1;
  google.protobuf.StringValue name = 2;
  google.protobuf.StringValue description = 3;
  google.protobuf.BoolValue isPrivate = 4;
}

message DeleteRoomRequest {
  string id = 1;
}

message DeleteRoomResponse {
  bool success = 1;
  string id = 2;
}

// ------ Member RPCs ------

message GetRoomMemberIdsRequest {
  string roomId = 1;
}

message GetRoomMemberIdsResponse {
  repeated string memberIds = 1;
}

message GetRoomMembersRequest {
  string roomId = 1;
}

message GetRoomMembersResponse {
  repeated ChatRoomMember members = 1;
}

message AddRoomMemberRequest {
  string roomId = 1;
  string userId = 2;
  RoomMemberRole role = 3;
}

message EditRoomMemberRequest {
  string id = 1;
  RoomMemberRole role = 2;
}

message RemoveRoomMemberRequest {
  string id = 1;
}

message RemoveRoomMemberResponse {
  bool success = 1;
  string id = 2;
}

// ------ Room messages RPCs ------

message CreateMessageRequest {
  string userId = 1;
  string roomId = 2;
  google.protobuf.StringValue text = 3;
  google.protobuf.StringValue attachments = 4;
  google.protobuf.StringValue parentId = 5;
  MessageType type = 6;
}

message EditMessageTextRequest {
  string id = 1;
  string text = 2;
}

message DeleteMessageRequest {
  string id = 1;
}

message DeleteMessageResponse {
  bool success = 1;
  string id = 2;
}

message GetRoomMessagesRequest {
  string roomId = 1;
  uint32 limit = 2;
}

message RoomMessages {
  string id = 1;
  MessageType type = 2;
  google.protobuf.StringValue parentId = 3;
  string userId = 4;
  string roomId = 5;
  string text = 6;
  google.protobuf.StringValue attachments = 7;
  bool isDeleted = 8;
  google.protobuf.Timestamp modifiedAt = 9;
  google.protobuf.Timestamp createdAt = 10;
  google.protobuf.Timestamp updatedAt = 11;
  string senderUsername = 12;
  google.protobuf.StringValue senderAvatarUrl = 13;
}

message GetRoomMessagesResponse {
  repeated RoomMessages messages = 1;
}

// ------ User RPCs ------

message CreateUserRequest {
  string email = 1;
  string username = 2;
  google.protobuf.StringValue name = 3;
  google.protobuf.StringValue bio = 4;
  google.protobuf.StringValue avatarUrl = 5;
}

message EditUserRequest {
  string id = 1;
  google.protobuf.StringValue email = 2;
  google.protobuf.StringValue username = 3;
  google.protobuf.StringValue name = 4;
  google.protobuf.StringValue bio = 5;
  google.protobuf.StringValue avatarUrl = 6;
  google.protobuf.Timestamp lastLogin = 7;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string id = 2;
}

message GetUserRequest {
  google.protobuf.StringValue id = 1;
  google.protobuf.StringValue email = 2;
  google.protobuf.StringValue username = 3;
}
